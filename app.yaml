# Google App Engine - Industry Frontend (Vite/React)
# Deploy: cd industry-frontend && gcloud app deploy
# npm start runs: build + serve dist on port 8080
# runtime: nodejs20
# env: standard
# service: default
runtime: nodejs20
service: industry-frontend

env: standard

handlers:
- url: /
  static_files: dist/index.html
  upload: dist/index.html

- url: /(.*)
  static_files: dist/\1
  upload: dist/(.*)